    <!-- ===== LOADING OVERLAY ===== -->

    <div id="landscape-warning">

          <div class="composite-gold-text">

        </div>

        <div id="diamond-text" style="display: none">💎 0</div>

    <script>
      (function () {
        var l = 0;
        document.addEventListener(
          "touchend",
          function (e) {
            var n = Date.now();
            if (n - l <= 300) e.preventDefault();
            l = n;
          },
          { passive: false },
        );
        document.addEventListener(
          "touchmove",
          function (e) {
            if (e.touches.length > 1) e.preventDefault();
          },
          { passive: false },
        );
        document.addEventListener("gesturestart", function (e) {
          e.preventDefault();
        });
        document.addEventListener("gesturechange", function (e) {
          e.preventDefault();
        });
        document.addEventListener("gestureend", function (e) {
          e.preventDefault();
        });
        document.addEventListener("dblclick", function (e) {
          e.preventDefault();
        });
        document.addEventListener("keydown", function (e) {
          if (
            (e.ctrlKey || e.metaKey) &&
            (e.key === "+" || e.key === "-" || e.key === "=")
          )
            e.preventDefault();
        });
      })();
    </script>
    <script>
      document.addEventListener("visibilitychange", function () {
        document.body.classList.toggle("app-paused", document.hidden);
      });
    </script>
    <!-- DEV MODE (conditionally loaded) -->
    <script>
      if (
        new URLSearchParams(location.search).has("dev") ||
        localStorage.getItem("dev_mode") === "1"
      ) {
        window.__DEV__ = true;
        var devCSS = document.createElement("link");
        devCSS.rel = "stylesheet";
        devCSS.href = "css/dev-panel.css";
        document.head.appendChild(devCSS);
        var devJS = document.createElement("script");
        devJS.src = "js/dev-panel.js";
        document.body.appendChild(devJS);
      }
    </script>
  </body>
</html>
